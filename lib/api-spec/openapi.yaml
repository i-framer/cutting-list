openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: boards
    description: Board/material records
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /boards:
    get:
      operationId: getBoardByCode
      tags: [boards]
      summary: Look up a board by code
      description: Returns stock dimensions for a board code if found
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: Board code to look up (e.g. "3mm MDF" or "FBCT540X60")
      responses:
        "200":
          description: Board found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoardRecord"
        "404":
          description: Board not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFound"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    BoardRecord:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        description:
          type: string
          nullable: true
        stock_length:
          type: integer
          nullable: true
        stock_width:
          type: integer
          nullable: true
      required:
        - id
        - code
    NotFound:
      type: object
      properties:
        error:
          type: string
      required:
        - error
